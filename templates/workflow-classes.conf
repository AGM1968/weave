# Workflow command/tool classifications. Compiled by scripts/gen-workflow-classes.sh.
# This is the source of truth for the pre-action hook and WORKFLOW.md command classes.

# Commands that are safe before a node is active.
# add: creates the node needed to leave discovery; work: claims it; ready/status/list/show: inspect graph.
# sync/load/doctor: maintain or inspect graph state without editing project files.
# bootstrap/search/context: session setup and read-only discovery; quick: creates tracked trivial work;
# recover: resumes an interrupted tracked workflow.
bootstrap_allow = add,work,ready,status,list,show,sync,load,doctor,bootstrap,search,context,quick,recover

# Lifecycle commands that require the active-node enforcement path.
# done: closes the active node; ship: done+sync shortcut, also closes the active node
# (gating it is intentional — a close needs an active node to close). `wv-close` (hyphen)
# is matched separately in the hook; there is no space-form `wv close` subcommand.
close_gated = done,ship

# Pre-action hook adapter tool names. This adapter accepts Claude Code and VS Code
# tool protocols; other agents use their own integration surfaces and the universal
# command classes above.
hook_edit_tools = Edit,Write,NotebookEdit,mcp__ide__executeCode,create_file,replace_string_in_file,insert_edit_into_file,multi_replace_string_in_file,edit_notebook_file

# Claude Code runtime state, not project work. $HOME is expanded by the hook, not this manifest.
claude_edit_exempt_prefixes = $HOME/.claude/
