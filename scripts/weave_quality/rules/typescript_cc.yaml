id: typescript-cc
language: typescript
rule:
  any:
    - kind: if_statement
    - kind: ternary_expression
    - kind: for_statement
    - kind: for_in_statement
    - kind: while_statement
    - kind: do_statement
    - kind: catch_clause
    - kind: switch_case
    - pattern: "$A && $B"
    - pattern: "$A || $B"
    - pattern: "$A ?? $B"
